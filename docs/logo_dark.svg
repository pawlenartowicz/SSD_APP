<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="sphere-body"
                    cx="42%" cy="38%" r="58%" fx="35%" fy="30%">
      <stop offset="0%"   stop-color="#5173aa" stop-opacity="0.82"/>
      <stop offset="35%"  stop-color="#3e557e" stop-opacity="0.78"/>
      <stop offset="70%"  stop-color="#2e3d5a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#222a3e" stop-opacity="0.72"/>
    </radialGradient>
    <radialGradient id="specular"
                    cx="36%" cy="30%" r="18%" fx="36%" fy="30%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </radialGradient>
    <linearGradient id="ssd-grad"
                    x1="29.2" y1="189.7"
                    x2="226.8" y2="66.3"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6bbae6"/>
      <stop offset="50%"  stop-color="#6c9ce6"/>
      <stop offset="100%" stop-color="#6b7de6"/>
    </linearGradient>
    <filter id="line-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="sphere-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="dot-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <clipPath id="rounded-clip">
      <rect width="256" height="256" rx="32" ry="32"/>
    </clipPath>
  </defs>

  <rect width="256" height="256" rx="32" ry="32" fill="#0d1117"/>

  <g clip-path="url(#rounded-clip)">
  <!-- Full line behind sphere (interior ghosts through) -->
  <line x1="29.2" y1="189.7" x2="226.8" y2="66.3"
        stroke="url(#ssd-grad)" stroke-width="28" stroke-linecap="round"
        stroke-opacity="0.20" filter="url(#line-glow)"/>
  <line x1="29.2" y1="189.7" x2="226.8" y2="66.3"
        stroke="url(#ssd-grad)" stroke-width="9.0" stroke-linecap="round"
        stroke-opacity="0.80"/>

  <!-- Back endpoint -->
  <circle cx="29.2" cy="189.7" r="4.5"
          fill="#6bbae6" fill-opacity="0.50" filter="url(#dot-glow)"/>
  <circle cx="29.2" cy="189.7" r="2.5"
          fill="#6bbae6" fill-opacity="0.85"/>

  <!-- Sphere -->
  <circle cx="128.0" cy="128.0" r="90.5"
          fill="none" stroke="#89afeb" stroke-width="3"
          stroke-opacity="0.06" filter="url(#sphere-glow)"/>
  <circle cx="128.0" cy="128.0" r="89.6" fill="url(#sphere-body)"/>
  <circle cx="128.0" cy="128.0" r="89.6" fill="url(#specular)"/>

  <!-- Front segment (on top of sphere) -->
  <line x1="204.0" y1="80.5" x2="226.8" y2="66.3"
        stroke="url(#ssd-grad)" stroke-width="32" stroke-linecap="round"
        stroke-opacity="0.25" filter="url(#line-glow)"/>
  <line x1="204.0" y1="80.5" x2="226.8" y2="66.3"
        stroke="url(#ssd-grad)" stroke-width="10.0" stroke-linecap="round"
        stroke-opacity="0.90"/>

  <!-- Front endpoint -->
  <circle cx="226.8" cy="66.3" r="5"
          fill="#6b7de6" fill-opacity="0.60" filter="url(#dot-glow)"/>
  <circle cx="226.8" cy="66.3" r="3"
          fill="#6b7de6" fill-opacity="0.90"/>
  </g>
</svg>
